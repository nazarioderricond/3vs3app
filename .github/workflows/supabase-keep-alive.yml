name: Supabase Keep Alive

on:
  schedule:
    # Run everyday at 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: write
  contents: write

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase to prevent sleep
        run: |
          echo "Pinging Supabase REST API to prevent pausing due to inactivity..."
          # Capture status code and handle network failures cleanly
          if ! STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://etbpjlpbzvqcpphsywgu.supabase.co/rest/v1/seasons?select=*&limit=1" \
          -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0YnBqbHBienZxY3BwaHN5d2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM5NzYxODQsImV4cCI6MjA3OTU1MjE4NH0.8NkLYP-bddMIr8j214H3awNJNqsR_Aq89gAU-H6XTCM" \
          -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0YnBqbHBienZxY3BwaHN5d2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM5NzYxODQsImV4cCI6MjA3OTU1MjE4NH0.8NkLYP-bddMIr8j214H3awNJNqsR_Aq89gAU-H6XTCM"); then
            echo "Error: Could not reach Supabase host. The project might be paused or deleted."
            STATUS="FAILED"
          fi
          
          if [ "$STATUS" = "200" ]; then
            echo "Successfully pinged Supabase API (Status: 200)."
          elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "000" ]; then
            echo "Warning: Could not reach Supabase host (Status: $STATUS)."
            echo "Please check https://app.supabase.com to unpause if necessary."
          else
            echo "Warning: Received status $STATUS from Supabase."
          fi
          # We don't fail the job so that the subsequent dummy commit still runs

      - name: Keepalive dummy commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive dummy commit" || true
          git push || true
