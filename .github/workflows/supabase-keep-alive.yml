name: Supabase Keep Alive

on:
  schedule:
    # Run at 00:00 every Wednesday and Sunday
    - cron: '0 0 * * 0,3'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent sleep
        run: |
          echo "Pinging Supabase REST API to prevent pausing due to inactivity..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://etbpjlpbzvqcpphsywgu.supabase.co/rest/v1/seasons?select=*" \
          -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0YnBqbHBienZxY3BwaHN5d2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM5NzYxODQsImV4cCI6MjA3OTU1MjE4NH0.8NkLYP-bddMIr8j214H3awNJNqsR_Aq89gAU-H6XTCM" \
          -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0YnBqbHBienZxY3BwaHN5d2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM5NzYxODQsImV4cCI6MjA3OTU1MjE4NH0.8NkLYP-bddMIr8j214H3awNJNqsR_Aq89gAU-H6XTCM")
          
          if [ "$STATUS" -eq 200 ]; then
            echo "Successfully pinged Supabase API (Status: 200)."
          else
            echo "Warning: Received status $STATUS from Supabase."
            # We don't exit with error to not fail the workflow unnecessarily, but log the status
          fi
